
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhysLab VR - Vertical Fall</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
    
    <style>
        #ui-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 8px; font-family: sans-serif;
            z-index: 10;
        }
        button { padding: 10px 20px; cursor: pointer; background: #4444ff; border: none; color: white; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 5px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <button onclick="resetBall()">Скинути м'яч (з 5м)</button>
        <table>
            <tr><td>Висота:</td><td id="val-height">5.00 м</td></tr>
            <tr><td>Швидкість:</td><td id="val-velocity">0.00 м/с</td></tr>
        </table>
    </div>

    <a-scene physics="debug: true">
        <a-sphere id="ball" dynamic-body="mass: 1" position="0 5 0" radius="0.3" color="red"></a-sphere>
        
        <a-entity id="trajectory" line="color: yellow; opacity: 0.8"></a-entity>
        
        <a-plane static-body rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
        <a-camera position="0 1.6 3"></a-camera>
    </a-scene>

    <script>
        const ball = document.querySelector('#ball');
        const trajectory = document.querySelector('#trajectory');

        function resetBall() {
            // Повертаємо м'яч на висоту 5 метрів
            ball.body.position.set(0, 5, 0);
            ball.body.velocity.set(0, 0, 0);
        }

        function update() {
            if (ball.body) {
                const pos = ball.body.position;
                const vel = ball.body.velocity;

                // Оновлення таблиці
                document.getElementById('val-height').textContent = pos.y.toFixed(2) + " м";
                document.getElementById('val-velocity').textContent = Math.abs(vel.y).toFixed(2) + " м/с";

                // Малюємо лінію від 5 метрів до поточної висоти м'яча
                if (pos.y < 5) {
                    trajectory.setAttribute('line', 'start', '0 5 0');
                    trajectory.setAttribute('line', 'end', `0 ${pos.y} 0`);
                } else {
                    trajectory.setAttribute('line', 'end', '0 5 0');
                }
            }
            requestAnimationFrame(update);
        }
        
        requestAnimationFrame(update);
    </script>
</body>
</html>
