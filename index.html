<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>A-Frame Physics Fixed</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>

    <!-- Physics system (сучасна версія) -->
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@4.0.2/dist/aframe-physics-system.min.js"></script>
  </head>

  <body>
    <a-scene physics="driver: ammo; debug: true">

      <!-- ПІДЛОГА -->
      <a-box
        position="0 -1 0"
        width="20"
        height="1"
        depth="20"
        color="#4CAF50"
        static-body
      ></a-box>

      <!-- ПАДАЮЧИЙ КУБ -->
      <a-box
        position="0 5 -3"
        width="1"
        height="1"
        depth="1"
        color="red"
        dynamic-body
      ></a-box>

      <!-- СФЕРА -->
      <a-sphere
        position="2 8 -3"
        radius="0.5"
        color="blue"
        dynamic-body
      ></a-sphere>

      <!-- СВІТЛО -->
      <a-light type="ambient" intensity="0.6"></a-light>
      <a-light type="directional" position="2 5 3"></a-light>

      <!-- КАМЕРА -->
      <a-entity position="0 1.6 5">
        <a-camera wasd-controls look-controls></a-camera>
      </a-entity>

    </a-scene>
  </body>
</html>
