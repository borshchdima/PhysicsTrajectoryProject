<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>PhysLab VR - Data Table</title>
    <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
    <script src="https://cdn.rawgit.com/donmccurdy/aframe-physics-system/v4.0.1/dist/aframe-physics-system.min.js"></script>
    
    <style>
        #data-panel {
            position: absolute; top: 10px; left: 10px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 15px; border-radius: 8px; font-family: sans-serif;
        }
        table { width: 100%; border-collapse: collapse; }
        td { padding: 5px; border: 1px solid #444; }
    </style>
</head>
<body>

    <div id="data-panel">
        <h3>Параметри падіння</h3>
        <table>
            <tr><td>Висота (Y):</td><td id="val-height">0</td></tr>
            <tr><td>Швидкість (V):</td><td id="val-velocity">0</td></tr>
        </table>
    </div>

    <a-scene physics="debug: true">
        <a-sphere id="ball" dynamic-body="mass: 5" position="0 5 -5" radius="0.5" color="red"></a-sphere>
        <a-plane static-body rotation="-90 0 0" width="20" height="20" color="#7BC8A4"></a-plane>
        <a-camera position="0 1.6 0"></a-camera>
    </a-scene>

    <script>
        const ball = document.querySelector('#ball');
        const heightEl = document.querySelector('#val-height');
        const velEl = document.querySelector('#val-velocity');

        function updateData() {
            if (ball.body) {
                // Отримуємо позицію та швидкість з фізичного тіла Cannon.js
                const pos = ball.body.position;
                const vel = ball.body.velocity;
                
                // Висота (Y)
                heightEl.textContent = pos.y.toFixed(2) + " м";
                
                // Швидкість (векторна сума v = sqrt(vx^2 + vy^2 + vz^2))
                const speed = Math.sqrt(vel.x**2 + vel.y**2 + vel.z**2);
                velEl.textContent = speed.toFixed(2) + " м/с";
            }
            requestAnimationFrame(updateData);
        }
        
        // Починаємо оновлення
        requestAnimationFrame(updateData);
    </script>
</body>
</html>
